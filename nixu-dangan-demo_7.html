    class AudioDirector{
      constructor(){this.ctx=null;this.enabled=false;this.requested=true;this.timer=null;this.theme='story';this.step=0;this.music=null;this.sfxBus=null}
      async start(){
        if(!this.requested)return;
        if(!this.ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;this.ctx=new AC();this.music=this.ctx.createGain();this.sfxBus=this.ctx.createGain();this.music.gain.value=.72;this.sfxBus.gain.value=.86;this.music.connect(this.ctx.destination);this.sfxBus.connect(this.ctx.destination)}
        this.enabled=true;await this.ctx.resume();this.music.gain.setTargetAtTime(.72,this.ctx.currentTime,.06);this.restart();renderHeaderOnly();
      }
      async toggle(){
        if(this.requested){this.requested=false;if(this.enabled){this.enabled=false;clearInterval(this.timer);this.timer=null;this.music.gain.setTargetAtTime(.0001,this.ctx.currentTime,.06)}}else{this.requested=true;await this.start()}
        renderHeaderOnly();
      }
      setTheme(t){if(this.theme===t)return;this.theme=t;this.step=0;if(this.enabled)this.restart()}
      restart(){clearInterval(this.timer);this.pulse();const tempos={story:2100,map:1750,battle:1350,boss:980,ending:2300};this.timer=setInterval(()=>this.pulse(),tempos[this.theme]||1700)}
      tone(freq,at,dur,vol,type='triangle',dest=this.music){if(!this.ctx||!this.enabled)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();o.type=type;o.frequency.value=freq;o.detune.value=-4+Math.random()*8;f.type='lowpass';f.frequency.value=this.theme==='boss'?1250:1900;g.gain.setValueAtTime(.0001,at);g.gain.exponentialRampToValueAtTime(vol,at+.035);g.gain.exponentialRampToValueAtTime(.0001,at+dur);o.connect(f).connect(g).connect(dest);o.start(at);o.stop(at+dur+.04)}
      pulse(){if(!this.ctx||!this.enabled)return;const sets={story:[146.83,164.81,196,220],map:[130.81,146.83,174.61,196,220],battle:[110,130.81,146.83,164.81],boss:[82.41,98,110,123.47],ending:[146.83,196,220,293.66]};const set=sets[this.theme],now=this.ctx.currentTime+.03,f=set[this.step%set.length];this.tone(f,now,this.theme==='boss'?1.6:3,.038,this.theme==='boss'?'sawtooth':'triangle');if(this.step%2===0)this.tone(set[(this.step+2)%set.length]*2,now+.35,1.8,.013,'sine');if(this.step%4===0)this.tone(set[0]/2,now,4,.018,'sine');this.step++}
      sfx(name){if(!this.ctx||!this.enabled)return;const n=this.ctx.currentTime+.01,play=(f,d=.16,v=.08,t='sine',delay=0)=>this.tone(f,n+delay,d,v,t,this.sfxBus);if(name==='click')play(520,.08,.035);if(name==='card'){play(260,.13,.06,'triangle');play(390,.12,.035,'sine',.06)}if(name==='resolve'){play(146,.35,.07,'triangle');play(220,.3,.05,'triangle',.1);play(293,.28,.035,'sine',.2)}if(name==='hurt'){play(95,.35,.1,'sawtooth');play(72,.42,.07,'triangle',.08)}if(name==='reward'){play(330,.25,.05);play(440,.3,.05,'sine',.12);play(660,.45,.04,'sine',.24)}if(name==='win'){[261,329,392,523].forEach((f,i)=>play(f,.7,.045,'sine',i*.13))}if(name==='lose'){[180,151,120,90].forEach((f,i)=>play(f,.5,.055,'triangle',i*.14))}}
    }
    const audio=new AudioDirector();

    function header(title='灾难循环'){return `<header class="top"><div class="brand"><div class="seal">逆</div><div><p class="eyebrow">CAUSAL ROGUELIKE PROTOTYPE</p><h1>逆序档案</h1></div></div><div class="top-actions"><span>${title}</span><button class="linkbtn ${audio.requested?'on':''}" id="musicBtn" aria-pressed="${audio.requested}">音乐：${audio.requested?'开':'关'}</button><button class="linkbtn" id="manualBtn">游戏说明</button>${run?'<button class="linkbtn" id="deckBtn">查看牌组</button>':''}<button class="linkbtn" id="resetBtn">返回标题</button></div></header>`}
    function hud(){if(!run)return'';return `<section class="hud"><div class="mission"><b>调查进度 ${Math.min(run.floor+1,6)} / 6</b>${run.currentTitle||'追查灾难的起点'}</div><div class="stats"><button class="stat" data-status="timeline" title="点击查看时间线说明"><small>时间线</small><strong>${run.hp}/${run.maxHp}</strong></button><button class="stat" data-status="paradox" title="点击查看悖论说明"><small>悖论</small><strong class="red">${run.paradox}/8</strong></button><button class="stat" data-status="deck" title="点击查看牌组说明"><small>牌组</small><strong class="gold">${run.deck.length}</strong></button><button class="stat" data-status="echoes" title="点击查看回声说明"><small>回声</small><strong class="gold">${run.echoes||0}</strong></button><button class="stat" data-status="ink" title="点击查看墨痕说明"><small>墨痕</small><strong>${meta.ink}</strong></button></div></section>`}
    function bindGlobal(){

    function renderHeaderOnly(){const b=$('#musicBtn');if(b){b.textContent=`音乐：${audio.requested?'开':'关'}`;b.classList.toggle('on',audio.requested);b.setAttribute('aria-pressed',String(audio.requested))}}
    const MANUAL={
      start:{title:'从这里开始',html:`<p>《逆序档案》是一款“操纵因果”的卡牌肉鸽。你不是削减敌人的生命，而是在固定事件发生前安排人物行动、证据与时间改写，拼出足够的<strong>真相</strong>。</p><h3>一局的完整流程</h3><ol><li>在路线图选择案件、事件、休整或商店。</li><li>案件中每回合抽 5 张牌并获得 3 点能量。</li><li>把牌放入过去、现在或未来，执行整条时间线。</li><li>达到案件要求的真相后结案，获得回声、卡牌与精英遗物。</li><li>通过六层调查，进入最终 Boss“零时档案”。</li></ol><h3>失败与继续</h3><p>时间线降至 0 或悖论达到 8 时，本局结束。你会带回墨痕；墨痕能解锁下一局的起始遗物。</p>`},
      timeline:{title:'时间轴与结算',html:`<p>每张牌都必须放进一个时段。执行后严格从<strong>过去 → 现在 → 未来</strong>结算；固定事件位于其中一个时段，你放在它之前或同一时段的牌可以提前干预。</p><div class="timeline-demo"><div><b>过去</b><small>适合建立条件、改写原因</small></div><div><b>现在</b><small>适合疏散、证词与即时行动</small></div><div><b>未来</b><small>适合批注、延迟和高收益规划</small></div></div><h3>读懂固定事件</h3><p>事件条会标出所在时段和失败后果。火灾需要“保护”，审讯需要“可信度”，销毁需要“锚定”，镜像则要求本轮使用不同标签。</p><h3>撤回</h3><p>执行前可以点击已经放入时间轴的牌撤回，能量会返还。执行后不能反悔。</p>`},
      cards:{title:'卡牌与五种标签',html:`<div class="manual-cards"><div class="manual-card 因"><b>因</b><span>创造条件，抵挡灾害</span></div><div class="manual-card 证"><b>证</b><span>直接获得真相、可信度</span></div><div class="manual-card 改"><b>改</b><span>取消或移动事件，常伴随悖论</span></div><div class="manual-card 锚"><b>锚</b><span>保护真相，降低悖论</span></div><div class="manual-card 悖"><b>悖</b><span>高收益、高风险</span></div></div><h3>抽牌与弃牌</h3><p>未打出的手牌和已打出的牌都会在回合末进入弃牌堆；抽牌堆为空时，弃牌堆自动洗回。获得的新牌从下一场案件开始加入牌组。</p><h3>构筑建议</h3><ul><li>牌多不等于更强；在休整或商店删掉低价值牌，可以更稳定抽到核心牌。</li><li>“证”负责积累真相，“因/锚”负责让你活到结案。</li><li>“改/悖”可以爆发，但必须准备降低悖论的手段。</li></ul>`},
      route:{title:'路线与节点',html:`<h3>案件 / 精英</h3><p>通过时间轴获取指定真相。普通案件给予回声和卡牌；精英更危险，但会额外掉落能改变玩法的遗物。</p><h3>异常事件</h3><p>剧情选择会改变牌组、生命上限或悖论，并揭露第零号时间线的线索。</p><h3>休整</h3><p>可以回复时间线、降低悖论，或永久移除本局牌组中的一张牌。</p><h3>倒悬书摊</h3><p>使用局内货币“回声”购买卡牌、遗物、修复服务或删牌。未花掉的回声不会带出本局。</p><h3>Boss</h3><p>最终案件会连续改写规则并造成高额坍塌伤害。进入前应准备锚牌、稳定真相来源与至少一种取消事件的方法。</p>`},
      relics:{title:'遗物与成长',html:`<p>遗物会永久影响当前一局，不占用牌组位置。</p><ul>${Object.values(RELICS).map(r=>`<li><strong>${r.name}</strong>：${r.text}</li>`).join('')}</ul><h3>两种成长</h3><p><strong>局内：</strong>卡牌、遗物、牌组精简和当前资源。死亡后清空。</p><p><strong>局外：</strong>墨痕、已完成循环数与结局记录，保存在浏览器本地。累计 3 枚墨痕后，下一局会携带烧焦的怀表。</p>`},
      status:{title:'状态、资源与胜负',html:`<h3>真相 · 当前案件的胜利进度</h3><p>打牌和破解固定事件可以增加真相。达到案件要求就会结案并获得奖励；下一场案件重新从 0 开始。</p><h3>时间线 · 本局生命</h3><p>固定事件会损伤时间线。降到 0 时整局失败；可在休整、商店和部分卡牌效果中修复。</p><h3>悖论 · 跨案件危险值</h3><p>改写过去和使用高风险牌会增加悖论，达到 8 时整局立即失败。时间锚、休整和部分事件可以降低。</p><h3>可信度 · 当前案件辅助状态</h3><p>只在当前案件内存在。可信度能让审讯中的证词被采纳，并强化“双重证词”等牌。</p><h3>墨痕 · 局外永久资源</h3><p>失败或通关后获得，保存在浏览器本地，用于解锁下一局的起始遗物。它不会在失败后清空。</p><h3>回声 · 本局货币</h3><p>结案后获得，可在倒悬书摊购买卡牌、遗物、治疗和删牌服务；本局结束时清空。</p><h3>音乐与音效</h3><p>音乐默认启用，在页面第一次点击或按键时开始；右上角可随时关闭。</p><h3>三个实用技巧</h3><ul><li>先看固定事件，再决定这一回合是“拿真相”还是“保命”。</li><li>不必花光所有能量；错误的悖论牌可能比空过更危险。</li><li>锚定只对当前回合生效，不要过早使用。</li></ul>`}
    };
    function showManual(tab='start'){
      document.querySelector('.manual-backdrop')?.remove();
      const wrap=document.createElement('div');wrap.className='manual-backdrop';
      wrap.innerHTML=`<section class="manual"><nav class="manual-nav"><p class="eyebrow">PLAYER MANUAL</p><h2>调查员说明书</h2>${Object.entries(MANUAL).map(([id,v])=>`<button class="${id===tab?'active':''}" data-manual="${id}">${v.title}</button>`).join('')}<button id="closeManual">关闭说明书</button></nav><article class="manual-body"><p class="eyebrow">${tab.toUpperCase()}</p><h2>${MANUAL[tab].title}</h2>${MANUAL[tab].html}<div class="manual-actions"><button id="resetGuide">重新开启新手引导</button><button id="closeManual2">返回游戏</button></div></article></section>`;
      document.body.appendChild(wrap);wrap.onclick=e=>{if(e.target===wrap)wrap.remove()};
      wrap.querySelectorAll('[data-manual]').forEach(b=>b.onclick=()=>showManual(b.dataset.manual));
      wrap.querySelector('#closeManual').onclick=()=>wrap.remove();wrap.querySelector('#closeManual2').onclick=()=>wrap.remove();
      wrap.querySelector('#resetGuide').onclick=()=>{meta.tutorialDone=false;if(run)run.guide=0;saveMeta();wrap.remove();showToast('新手引导已重新开启');render()};
    }
    function attachGuide(step,title,text,action='知道了',fn=()=>document.querySelector('.guide')?.remove()){
      document.querySelector('.guide')?.remove();const g=document.createElement('aside');g.className='guide';g.innerHTML=`<span class="guide-step">${step}</span><div><strong>${title}</strong><p>${text}</p></div><button id="guideAction">${action}</button>`;document.body.appendChild(g);g.querySelector('#guideAction').onclick=fn;
    }
    function render(){
      const app=$('#app');
      if(state.screen==='intro')renderIntro(app);
      else if(state.screen==='map')renderMap(app);
      else if(state.screen==='event')renderEvent(app);
      else if(state.screen==='rest')renderRest(app);
      else if(state.screen==='battle')renderBattle(app);
      else if(state.screen==='reward')renderReward(app);
      else if(state.screen==='shop')renderShop(app);
      else if(state.screen==='ending')renderEnding(app);
      bindGlobal();
    }
    function renderIntro(app){audio.setTheme('story');const unlocked=meta.ink>=3;app.innerHTML=`${header('档案馆 · 23:57')}<section class="intro panel screen"><div class="intro-copy"><span class="chapter">序章 · 第十八次火灾</span><h2>明天已经毁灭。<br>你只有今晚。</h2><p class="lead">白塔城在零点燃烧，而你每次都会在二十三点五十七分醒来。把行动放进过去、现在与未来，拼出一条能够成立的历史。</p><div class="quote">“不要相信档案管理员。尤其当他摘下面具以后。”<br>——一张笔迹属于你的、日期却来自明天的便签</div>${unlocked?'<div class="relic">已解锁起始遗物「烧焦的怀表」：每场案件第一张牌费用为 0。</div>':''}<button class="primary" id="startBtn"><span>${meta.runs?'再次进入循环':'进入灾难循环'}</span><b>→</b></button></div><div class="intro-art"><div class="clock"><div class="clock-core">零</div></div><div class="fragment-count">已经历 ${meta.runs} 次循环 · 收集 ${meta.ink} 枚墨痕</div></div></section>`;$('#startBtn').onclick=startRun}
    function startRun(){audio.sfx('resolve');run={hp:30,maxHp:30,paradox:0,echoes:10,deck:[...START_DECK],relics:meta.ink>=3?['watch']:[],floor:0,cleared:[],story:['你在第十八次火灾前醒来。'],currentTitle:'追查灾难的起点',guide:meta.tutorialDone?99:0};if(meta.wins>0)run.deck.push('annotation');state.screen='map';audio.setTheme('map');render()}
    function renderMap(app){audio.setTheme('map');const layers=LAYERS.map((layer,i)=>`<div class="layer"><span class="layer-tag">0${i+1}</span>${layer.map(n=>{const enabled=i===run.floor,cleared=run.cleared.some(x=>x.floor===i&&x.id===n.id);return `<button class="node ${n.type} ${enabled?'current':''} ${cleared?'cleared':''}" data-node="${n.id}" data-type="${n.type}" ${enabled?'':'disabled'}><span class="node-icon">${n.icon}</span><small>${n.sub}</small><strong>${n.title}</strong><p>${n.desc}</p></button>`}).join('')}</div>`).join('');app.innerHTML=`${header('白塔城 · 路线图')}${hud()}<section class="map-layout screen"><div class="map-main panel"><div class="section-title"><div><p class="eyebrow">SELECT A RECORD</p><h2>选择下一份档案</h2></div><p>风险越高，能带走的因果越强。</p></div><div class="route">${layers}</div></div><aside class="side panel"><div class="side-block"><p class="eyebrow">RELIC</p><h3>随身遗物 · ${run.relics.length}</h3>${run.relics.length?run.relics.map(id=>`<div class="relic">${RELICS[id].name} · ${RELICS[id].text}</div>`).join(''):'<div class="relic">断墨砚 · 记录每一次失败，但不替你承担结果</div>'}</div><div class="side-block"><p class="eyebrow">DECK</p><h3>当前牌组 · ${run.deck.length} 张</h3><div class="deck-mini">${run.deck.slice(0,8).map(id=>miniCard(id)).join('')}${run.deck.length>8?`<div class="mini-card">另有 ${run.deck.length-8} 张…</div>`:''}</div></div><div><p class="eyebrow">TRACES</p><h3>追踪线索</h3><div class="story-log">${run.story.slice(-5).map((x,i)=>`<span>0${i+1} · ${x}</span>`).join('')}</div></div></aside></section>`;document.querySelectorAll('[data-node]').forEach(b=>b.onclick=()=>selectNode(b.dataset.type,b.dataset.node));if(run.guide===0)attachGuide('1/5','先选择一条路线','只有当前层的节点可以进入。案件会给牌与回声；事件和休整能改变资源。','选择任意节点',()=>document.querySelector('.guide')?.remove())}
    function miniCard(id){const c=CARDS[id];return `<div class="mini-card ${c.kind}">${c.kind} · ${c.name}</div>`}
    function selectNode(type,id){audio.sfx('click');document.querySelector('.guide')?.remove();if(run.guide===0)run.guide=1;run.currentNode=id;run.currentTitle=LAYERS.flat().find(n=>n.id===id)?.title||'';if(type==='battle'||type==='elite'||type==='boss')startBattle(id);else{state={screen:type,id};render()}}
    function renderEvent(app){audio.setTheme('story');const telegram=state.id==='telegram';const title=telegram?'无字电报':'失真的合影',narrative=telegram?'电报纸上没有一个字。你把它靠近灯火，未来的墨迹才慢慢浮现：仓库不是灾难的起点，档案馆才是。':'照片里站着四个人。证人、监察官、档案管理员，以及一个本不该在场的你。照片背面写着：“剪掉一个人，时间就会忘记他。”';app.innerHTML=`${header('异常事件')}${hud()}<section class="story-screen panel screen"><p class="eyebrow">ANOMALOUS RECORD</p><span class="chapter">${run.currentTitle}</span><h2>${title}</h2><p class="narrative">${narrative}</p><div class="choices">${telegram?`<button class="choice" data-choice="read"><span class="choice-icon">读</span><div><strong>让未来的文字完全显现</strong><small>将「逆序批注」加入牌组，但接触未来会产生悖论。</small></div><em>+1 悖论</em></button><button class="choice" data-choice="burn"><span class="choice-icon">焚</span><div><strong>在读完之前烧掉电报</strong><small>你没有得到答案，但时间线暂时稳定。</small></div><em>回复 6</em></button>`:`<button class="choice" data-choice="keep"><span class="choice-icon">留</span><div><strong>保留照片中的自己</strong><small>承认另一条时间线的存在，并取得一枚时间锚。</small></div><em>最大生命 -3</em></button><button class="choice" data-choice="cut"><span class="choice-icon">剪</span><div><strong>把自己从照片里剪掉</strong><small>忘掉一段危险记忆，让悖论下降。</small></div><em>悖论 -3</em></button>`}</div></section>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>resolveEvent(b.dataset.choice))}
    function resolveEvent(c){audio.sfx('reward');if(c==='read'){run.deck.push('annotation');run.paradox++;run.story.push('无字电报证明：档案馆才是灾难起点。')}if(c==='burn'){run.hp=Math.min(run.maxHp,run.hp+6);run.story.push('你烧掉未来的电报，只记住了纸灰的形状。')}if(c==='keep'){run.maxHp-=3;run.hp=Math.min(run.hp,run.maxHp);run.deck.push('anchor');run.story.push('合影里多出的自己，来自第零号时间线。')}if(c==='cut'){run.paradox=Math.max(0,run.paradox-3);run.story.push('照片忘记了你，但镜子没有。')}advanceNode()}
    function renderRest(app){audio.setTheme('story');if(state.removing){app.innerHTML=`${header('回声室 · 精简牌组')}${hud()}<section class="story-screen panel screen"><p class="eyebrow">REMOVE A MEMORY</p><h2>烧掉一段多余的因果</h2><p class="narrative">被烧掉的牌不会在本局再次出现。越薄的牌组越容易找到关键行动。</p><div class="remove-grid">${run.deck.map((id,i)=>{const c=CARDS[id];return `<button class="remove-card ${c.kind}" data-remove-index="${i}">${c.kind} · ${c.name}</button>`}).join('')}</div></section>`;document.querySelectorAll('[data-remove-index]').forEach(b=>b.onclick=()=>{audio.sfx('card');const [id]=run.deck.splice(+b.dataset.removeIndex,1);run.story.push(`你在回声室烧掉了「${CARDS[id].name}」。`);advanceNode()});return}
      app.innerHTML=`${header('安全节点')}${hud()}<section class="story-screen panel screen"><p class="eyebrow">SAFE RECORD</p><span class="chapter">回声室</span><h2>这里听不见零点的钟声</h2><p class="narrative">墙上密密麻麻写着你前十七次留下的警告。大多数互相矛盾，只有一句被反复圈起：“牌越少，越接近真相。”</p><div class="choices"><button class="choice" data-rest="heal"><span class="choice-icon">补</span><div><strong>缝合时间线</strong><small>休息片刻，修复事故留下的裂口。</small></div><em>回复 10</em></button><button class="choice" data-rest="calm"><span class="choice-icon">静</span><div><strong>静默校准</strong><small>放弃追索一段危险记忆。</small></div><em>悖论 -3</em></button><button class="choice" data-rest="remove"><span class="choice-icon">焚</span><div><strong>烧掉一张牌</strong><small>永久移除本局牌组中的一张牌。</small></div><em>精简牌组</em></button></div></section>`;document.querySelectorAll('[data-rest]').forEach(b=>b.onclick=()=>resolveRest(b.dataset.rest))}
    function resolveRest(c){audio.sfx('reward');if(c==='heal'){run.hp=Math.min(run.maxHp,run.hp+10);run.story.push('回声室让断裂的时间重新接合。');advanceNode()}else if(c==='calm'){run.paradox=Math.max(0,run.paradox-3);run.story.push('你放弃了一段危险记忆。');advanceNode()}else{state.removing=true;render()}}
    function advanceNode(){run.cleared.push({floor:run.floor,id:run.currentNode});run.floor++;state={screen:'map'};render()}

    function renderShop(app){
      audio.setTheme('story');
      if(!state.shop){const relic=shuffle(Object.keys(RELICS).filter(id=>!run.relics.includes(id)))[0]||'crane';state.shop={cards:shuffle(REWARD_POOL).slice(0,3),relic,bought:[],removing:false}}
      if(state.shop.removing){app.innerHTML=`${header('倒悬书摊 · 删除记录')}${hud()}<section class="story-screen panel screen"><p class="eyebrow">ERASE A CARD · 15 回声</p><h2>选择一段要卖掉的记忆</h2><p class="narrative">书摊主人不会问它来自谁。牌会从当前牌组永久移除。</p><div class="remove-grid">${run.deck.map((id,i)=>{const c=CARDS[id];return `<button class="remove-card ${c.kind}" data-shop-remove="${i}">${c.kind} · ${c.name}</button>`}).join('')}</div><div class="manual-actions"><button id="cancelRemove">取消</button></div></section>`;document.querySelectorAll('[data-shop-remove]').forEach(b=>b.onclick=()=>{const [id]=run.deck.splice(+b.dataset.shopRemove,1);run.echoes-=15;state.shop.bought.push('remove');state.shop.removing=false;audio.sfx('reward');showToast(`已删除「${CARDS[id].name}」`);render()});$('#cancelRemove').onclick=()=>{state.shop.removing=false;render()};return}
      const items=state.shop.cards.map((id,i)=>{const c=CARDS[id],sold=state.shop.bought.includes('c'+i);return `<article class="shop-item ${sold?'sold':''}"><p class="eyebrow">CARD</p><h3>${c.kind} · ${c.name}</h3><p>${c.text}</p><div class="price"><span>12 回声</span><button data-buy-card="${i}" ${sold||run.echoes<12?'disabled':''}>${sold?'已售':'购买'}</button></div></article>`}).join('');
      const relic=RELICS[state.shop.relic],relicSold=state.shop.bought.includes('relic');
      app.innerHTML=`${header('交易节点')}${hud()}<section class="story-screen panel screen"><p class="eyebrow">THE UPSIDE-DOWN BOOKSTALL</p><span class="chapter">倒悬书摊</span><h2>这里出售没有发生过的可能</h2><p class="narrative">摊主倒挂在天花板上，只收你在案件里留下的“回声”。他说钱带不出循环，所以最好现在花掉。</p><div class="shop-grid">${items}<article class="shop-item ${relicSold?'sold':''}"><p class="eyebrow">RELIC</p><h3>${relic.name}</h3><p>${relic.text}</p><div class="price"><span>25 回声</span><button id="buyRelic" ${relicSold||run.echoes<25?'disabled':''}>${relicSold?'已售':'购买'}</button></div></article><article class="shop-item ${state.shop.bought.includes('heal')?'sold':''}"><p class="eyebrow">SERVICE</p><h3>缝合时间线</h3><p>立即修复 8 点时间线。</p><div class="price"><span>10 回声</span><button id="buyHeal" ${state.shop.bought.includes('heal')||run.echoes<10?'disabled':''}>购买</button></div></article><article class="shop-item ${state.shop.bought.includes('remove')?'sold':''}"><p class="eyebrow">SERVICE</p><h3>删除一张牌</h3><p>从本局牌组永久移除一张牌。</p><div class="price"><span>15 回声</span><button id="buyRemove" ${state.shop.bought.includes('remove')||run.echoes<15?'disabled':''}>选择</button></div></article></div><button class="primary" id="leaveShop"><span>离开书摊</span><b>→</b></button></section>`;
      document.querySelectorAll('[data-buy-card]').forEach(b=>b.onclick=()=>{const i=+b.dataset.buyCard;run.echoes-=12;run.deck.push(state.shop.cards[i]);state.shop.bought.push('c'+i);audio.sfx('reward');render()});
      $('#buyRelic').onclick=()=>{run.echoes-=25;run.relics.push(state.shop.relic);state.shop.bought.push('relic');audio.sfx('reward');render()};
      $('#buyHeal').onclick=()=>{run.echoes-=10;run.hp=Math.min(run.maxHp,run.hp+8);state.shop.bought.push('heal');audio.sfx('reward');render()};
      $('#buyRemove').onclick=()=>{state.shop.removing=true;render()};$('#leaveShop').onclick=advanceNode;
    }

    function startBattle(id){const e=ENCOUNTERS[id];if(run.relics.includes('crane'))run.hp=Math.min(run.maxHp,run.hp+2);battle={id,enc:e,round:0,truth:0,cred:0,witness:true,draw:shuffle(run.deck),discard:[],hand:[],energy:3,placed:[],selected:null,log:[e.story]};drawCards(5);state={screen:'battle'};audio.setTheme(id==='boss'?'boss':'battle');render()}
    function drawCards(n){while(battle.hand.length<n){if(!battle.draw.length){if(!battle.discard.length)break;battle.draw=shuffle(battle.discard);battle.discard=[]}const id=battle.draw.shift();battle.hand.push({id,uid:id+'-'+Date.now()+'-'+Math.random()})}}
    function currentIncident(){const list=battle.enc.incidents;return INCIDENTS[list[Math.min(battle.round,list.length-1)]]}
    function effectiveCost(entry){const c=CARDS[entry.id];return run.relics.includes('watch')&&battle.placed.length===0?0:c.cost}
    function renderBattle(app){const inc=currentIncident(),pct=clamp(battle.truth/battle.enc.target*100,0,100),used=new Set(battle.placed.map(x=>x.uid));app.innerHTML=`${header(`${battle.enc.type} · 回合 ${battle.round+1}`)}${hud()}<section class="screen"><div class="battle-head"><div><p class="eyebrow">${battle.enc.type}</p><h2>${battle.enc.name}</h2><div class="storyline">${battle.enc.story}</div></div><div class="objective" data-status="truth" title="点击查看真相说明"><small>本案目标 · 真相达到此数值即可结案</small><strong>${battle.truth} / ${battle.enc.target}</strong><div class="progress"><i style="width:${pct}%"></i></div><div class="battle-resources"><span class="resource-pill energy-live"><b>${battle.energy}</b>/ 3 能量</span><button class="resource-pill" data-status="credibility" title="点击查看可信度说明">可信度 ${battle.cred} ?</button></div></div></div><div class="incident"><div class="incident-glyph">${inc.glyph}</div><h3>${inc.name}</h3><div class="incident-intent"><small>已知结果 · 位于${['过去','现在','未来'][inc.era]}</small><strong>${inc.intent}</strong></div></div><div class="timeline">${[0,1,2].map(era=>`<button class="era ${battle.selected?'target':''}" data-era="${era}"><div class="era-head"><span>0${era+1}</span><strong>${['过去','现在','未来'][era]}</strong><small>${['已发生','正在发生','尚可干预'][era]}</small></div><div class="drop">${battle.placed.filter(x=>x.era===era).map(x=>`<div class="placed ${CARDS[x.id].kind}" data-remove="${x.uid}"><i>${CARDS[x.id].kind}</i><strong>${CARDS[x.id].name}</strong><small>撤回</small></div>`).join('')}${inc.era===era?`<div class="fixed"><small>不可移动</small><strong>${inc.name.replace('固定事件：','')}</strong></div>`:''}${!battle.placed.some(x=>x.era===era)&&inc.era!==era?`<span class="drop-hint">${battle.selected?'放到这里':'等待行动'}</span>`:''}</div></button>`).join('')}</div><div class="hand-head"><div><p class="eyebrow">DRAW ${battle.draw.length} · DISCARD ${battle.discard.length}</p><h3>本轮手牌</h3></div><div class="energy"><b>${battle.energy}</b> / 3 能量</div></div><div class="hand">${battle.hand.map(entry=>cardButton(entry,used.has(entry.uid))).join('')}</div><div class="actionbar"><p>${battle.selected?`已选择「${CARDS[battle.selected.id].name}」— 放入一个时段`:battle.placed.length?`已编排 ${battle.placed.length} 个行动。执行后将从过去向未来结算。`:'选择手牌，开始改写因果。'}</p><button class="primary" id="resolveBtn" ${battle.placed.length?'':'disabled'}><span>执行时间线</span><b>→</b></button></div><div class="battle-log">${battle.log.slice(-2).join('　')}</div></section>`;
      document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>{const e=battle.hand.find(x=>x.uid===b.dataset.card);battle.selected=battle.selected?.uid===e.uid?null:e;if(run.guide===2&&battle.selected)run.guide=3;audio.sfx('click');render()});
      document.querySelectorAll('[data-era]').forEach(b=>b.onclick=e=>{if(e.target.closest('[data-remove]')||!battle.selected)return;placeBattleCard(+b.dataset.era)});
      document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=e=>{e.stopPropagation();removeBattleCard(b.dataset.remove)});$('#resolveBtn').onclick=resolveBattle;
      if(run.guide===1)attachGuide('2/5','先看胜负与状态','真相达到右上目标即可结案；时间线降到 0 或悖论达到 8 会整局失败。可信度用于让证词生效。所有带“?”的状态都可点击。','下一步',()=>{run.guide=2;render()});
      else if(run.guide===2)attachGuide('3/5','选择一张手牌','战斗顶部的金色圆圈显示剩余能量；每张牌左上角显示费用。每回合共有 3 点能量。','我来选牌');
      else if(run.guide===3)attachGuide('4/5','决定它何时发生','点击过去、现在或未来。位置会改变牌效，也决定能否赶在固定事件之前。','我来放置');
      else if(run.guide===4)attachGuide('5/5','执行整条时间线','还可以点击已放置的牌撤回。确认后按“执行时间线”，所有内容从过去向未来结算。','开始调查');
    }
    function cardButton(entry,used){const c=CARDS[entry.id],cost=effectiveCost(entry),disabled=used||battle.energy<cost;return `<button class="card ${c.kind} ${battle.selected?.uid===entry.uid?'selected':''}" data-card="${entry.uid}" ${disabled?'disabled':''}>${cost===0&&c.cost>0?'<span class="free">怀表 · 0</span>':''}<div class="card-top"><span class="cost">${cost}</span><span class="kind">${c.kind} · ${KIND_NAMES[c.kind]}</span></div><div class="art">${c.name[0]}</div><h4>${c.name}</h4><p>${c.text}</p><em>${c.flavor}</em></button>`}
    function placeBattleCard(era){const entry=battle.selected,cost=effectiveCost(entry);if(battle.energy<cost)return;battle.placed.push({...entry,era,paid:cost});battle.energy-=cost;battle.selected=null;if(run.guide===3)run.guide=4;audio.sfx('card');render()}
    function removeBattleCard(uid){const i=battle.placed.findIndex(x=>x.uid===uid);if(i<0)return;const [p]=battle.placed.splice(i,1);battle.energy+=p.paid;audio.sfx('click');render()}
    function resolveBattle(){audio.sfx('resolve');if(run.guide===4)run.guide=5;document.querySelector('.guide')?.remove();const inc=currentIncident(),msgs=[],beforeHp=run.hp,paradoxBefore=run.paradox;let protectedNow=false,anchored=false,cancelled=false,clarified=false,firstEvidence=true;const kinds=new Set();
      [...battle.placed].sort((a,b)=>a.era-b.era).forEach((p,idx)=>{const c=CARDS[p.id],before=p.era<=inc.era;kinds.add(c.kind);if(c.kind==='证'&&firstEvidence){if(run.relics.includes('redthread')){battle.truth++;msgs.push('朱砂红线：真相 +1。')}firstEvidence=false}
        if(c.id==='seal'&&before){protectedNow=true;msgs.push('仓库被封锁。')}
        if(c.id==='rescue'){if(p.era===1){battle.truth++;battle.witness=true;protectedNow=true;msgs.push('证人被及时疏散，真相 +1。')}else msgs.push('疏散时机错误。')}
        if(c.id==='ledger'){const g=battle.witness?3:2;battle.truth+=g;msgs.push(`账本残页：真相 +${g}。`)}
        if(c.id==='clarify'){battle.cred++;if(before)clarified=true;msgs.push('可信度 +1。')}
        if(c.id==='memory'){const g=p.era===0?4:3;battle.truth+=g;run.paradox+=2;msgs.push(`真实记忆：真相 +${g}，悖论 +2。`)}
        if(c.id==='anchor'&&before){anchored=true;run.paradox=Math.max(0,run.paradox-1);msgs.push('真相已锚定，悖论 -1。')}
        if(c.id==='alibi'){battle.cred+=2;battle.truth++;run.paradox+=2;msgs.push('伪造口供：真相 +1，悖论 +2。')}
        if(c.id==='blackout'){if(p.era===0){cancelled=true;run.paradox+=2;msgs.push('固定事件被提前停电取消。')}else msgs.push('停电来得太晚。')}
        if(c.id==='annotation'){const g=p.era===2?3:1;battle.truth+=g;msgs.push(`逆序批注：真相 +${g}。`)}
        if(c.id==='echo'){const g=Math.max(1,kinds.size);battle.truth+=g;msgs.push(`因果回响：真相 +${g}。`)}
        if(c.id==='testimony'){if(battle.cred>0){battle.truth+=2;msgs.push('口供被封存：真相 +2。')}battle.cred++}
        if(c.id==='vow'){let g=5;if(run.paradox>=4){g+=2;run.hp-=2}battle.truth+=g;msgs.push(`以身作证：真相 +${g}。`)}
        if(c.id==='thread'){battle.truth++;if(p.era===1)battle.cred++;msgs.push('红线追迹：真相 +1。')}
        if(c.id==='delay'){protectedNow=true;if(p.era===2)battle.truth++;msgs.push('固定事件被延迟。')}
        if(c.id==='doorplate'){protectedNow=true;if(p.era===0){battle.truth+=2;msgs.push('燃烧的门牌：真相 +2。')}}
        if(c.id==='chorus'){let g=3;if(battle.cred>=1)g+=2;battle.truth+=g;msgs.push(`双重证词：真相 +${g}。`)}
        if(c.id==='rewind'){if(p.era===0){cancelled=true;run.hp=Math.min(run.maxHp,run.hp+2);run.paradox+=2;msgs.push('回到案发前：事件取消，时间线 +2，悖论 +2。')}else msgs.push('你没能回到足够早。')}
        if(c.id==='sealorder'){anchored=true;if(kinds.has('证')){battle.truth+=2;msgs.push('封存命令：真相 +2。')}}
        if(c.id==='erase'){battle.truth+=4;battle.witness=false;run.paradox+=2;msgs.push('目击者被删除：真相 +4，悖论 +2。')}
        if(c.id==='secondhand'){if(p.era===2){battle.truth+=2;msgs.push('借来的秒针：真相 +2。')}else{run.paradox++;msgs.push('秒针错位：悖论 +1。')}}
      });
      if(!cancelled){
        if(inc===INCIDENTS.fire){if(protectedNow){battle.truth++;msgs.push('火灾被控制：真相 +1。')}else{run.hp-=4;battle.witness=false;msgs.push('证人死于火灾：时间线 -4。')}}
        if(inc===INCIDENTS.interrogation){if(battle.cred>=1){battle.truth+=2;msgs.push('证词被采纳：真相 +2。')}else{run.hp-=3;msgs.push('审讯击穿叙事：时间线 -3。')}}
        if(inc===INCIDENTS.rumor){if(clarified){battle.truth++;msgs.push('假报纸被揭穿：真相 +1。')}else{battle.cred=0;run.paradox++;msgs.push('谣言覆盖证词：悖论 +1。')}}
        if(inc===INCIDENTS.mirror){if(kinds.size>=2){battle.truth+=2;msgs.push('镜像无法复制组合：真相 +2。')}else{run.hp-=3;msgs.push('单一行动被镜像反制：时间线 -3。')}}
        if(inc===INCIDENTS.theft){if(protectedNow){battle.truth++;msgs.push('证物保住了：真相 +1。')}else{run.hp-=3;msgs.push('证物被窃：时间线 -3。')}}
        if(inc===INCIDENTS.purge){if(anchored)msgs.push('销毁无法触及被锚定的真相。');else{battle.truth=Math.max(0,battle.truth-3);msgs.push('档案销毁：真相 -3。')}}
        if(inc===INCIDENTS.rewrite){run.hp-=2;run.paradox++;msgs.push('规则被改写：时间线 -2，悖论 +1。')}
        if(inc===INCIDENTS.collapse){if(anchored){battle.truth+=2;msgs.push('你站在坍塌中固定历史：真相 +2。')}else{run.hp-=6;run.paradox++;msgs.push('零时坍塌：时间线 -6，悖论 +1。')}}
        if(inc===INCIDENTS.toll){if(anchored){battle.truth+=2;msgs.push('钟声被固定：真相 +2。')}else{run.hp-=4;msgs.push('第十三声钟响：时间线 -4。')}}
        if(inc===INCIDENTS.silence){if(kinds.has('证')){battle.truth+=2;msgs.push('证据替全城开口：真相 +2。')}else{run.hp-=4;msgs.push('全城失语：时间线 -4。')}}
        if(inc===INCIDENTS.inversion){if(kinds.has('改')){battle.truth+=2;msgs.push('你顺着倒置的因果找到入口：真相 +2。')}else{run.paradox+=2;msgs.push('因果倒置：悖论 +2。')}}
      }
      if(cancelled&&run.relics.includes('ash')){run.hp=Math.min(run.maxHp,run.hp+2);msgs.push('灰烬印章：时间线 +2。')}
      if(run.paradox>paradoxBefore&&run.relics.includes('mirror')){battle.truth++;msgs.push('镜面残片记录了矛盾：真相 +1。')}
      if(run.hp<beforeHp)audio.sfx('hurt');battle.log=msgs;
      if(run.hp<=0||run.paradox>=8){finishRun(false,run.paradox>=8?'悖论互相否定，整条时间线从未存在过。':'时间线彻底断裂，你再次在火灾前三分钟醒来。');return}
      if(battle.truth>=battle.enc.target){if(battle.id==='boss'){finishRun(true);return}winBattle();return}
      battle.discard.push(...battle.hand.map(x=>x.id));battle.hand=[];battle.placed=[];battle.selected=null;battle.energy=3;battle.round++;drawCards(5);render()
    }
    function winBattle(){audio.sfx('reward');const elite=['twins','faceless'].includes(battle.id),gain=elite?18:12;run.echoes+=gain;let relicGained=null;if(elite){const pool=Object.keys(RELICS).filter(id=>!run.relics.includes(id));if(pool.length){relicGained=shuffle(pool)[0];run.relics.push(relicGained)}}run.story.push(`${battle.enc.name}已结案，留下 ${battle.truth} 点真相与 ${gain} 枚回声。`);rewardOptions=shuffle(REWARD_POOL).slice(0,3);state={screen:'reward',gain,relicGained};audio.setTheme('story');render()}
    function renderReward(app){app.innerHTML=`${header('战后记录')}${hud()}<section class="reward panel screen"><p class="eyebrow">ADD A POSSIBILITY</p><h2>带走一种新的可能</h2><p class="lead">本案获得 ${state.gain} 枚回声。选择一张牌加入本局牌组；它会从下一份档案开始出现。</p>${state.relicGained?`<div class="relic">精英遗物 · ${RELICS[state.relicGained].name}：${RELICS[state.relicGained].text}</div>`:''}<div class="reward-grid">${rewardOptions.map(id=>{const c=CARDS[id];return `<button class="card reward-card ${c.kind}" data-reward="${id}"><div class="card-top"><span class="cost">${c.cost}</span><span class="kind">${c.kind} · ${KIND_NAMES[c.kind]}</span></div><div class="art">${c.name[0]}</div><h4>${c.name}</h4><p>${c.text}</p><em>${c.flavor}</em></button>`}).join('')}</div><button class="linkbtn skip" id="skipReward">跳过奖励 · 修复 3 点时间线</button></section>`;document.querySelectorAll('[data-reward]').forEach(b=>b.onclick=()=>{audio.sfx('reward');run.deck.push(b.dataset.reward);advanceNode()});$('#skipReward').onclick=()=>{run.hp=Math.min(run.maxHp,run.hp+3);advanceNode()};if(run.guide===5)attachGuide('完成','战后构筑','每场案件后都能选择新牌。不要只看单卡强度，也要考虑牌组是否更稳定。','完成新手引导',()=>{run.guide=99;meta.tutorialDone=true;saveMeta();document.querySelector('.guide')?.remove();showToast('新手引导完成，可在说明书中重新开启')})}
    function finishRun(win,reason=''){audio.sfx(win?'win':'lose');if(win){meta.wins++;meta.ink+=3;run.story.push('零时档案被改写，但第零号档案仍未开启。')}else meta.ink+=Math.max(1,run.floor);meta.runs++;saveMeta();state={screen:'ending',win,reason};audio.setTheme('ending');render()}
    function renderEnding(app){const win=state.win,firstUnlock=meta.ink>=3;app.innerHTML=`${header(win?'档案结算 · 历史成立':'档案结算 · 循环重启')}<section class="ending panel screen ${win?'':'loss'}"><div class="ending-inner"><p class="eyebrow">${win?'CASE CLOSED · NOT THE END':'TIMELINE COLLAPSED · TRY AGAIN'}</p><div class="ending-seal">${win?'真':'悖'}</div><h2>${win?'你阻止了零点火灾':'这条历史无法成立'}</h2><p class="narrative">${win?'档案管理员在消失前，把一把不存在的钥匙塞进你手里。档案馆地下还有一层，门牌上写着“第零号”。而门后的值班表，签着你的名字，日期是明天。':state.reason}</p><div class="unlock">本次带回 ${win?3:Math.max(1,run.floor)} 枚墨痕 · 累计 ${meta.ink} 枚<br>${firstUnlock?'下一次循环将携带「烧焦的怀表」；每场案件第一张牌费用为 0。':'收集 3 枚墨痕，可从下一次循环携带新的遗物。'}</div><button class="primary" id="againBtn"><span>${win?'带着钥匙进入下一次循环':'记住失败，再试一次'}</span><b>↻</b></button></div></section>`;$('#againBtn').onclick=()=>{audio.sfx('resolve');state={screen:'intro'};run=null;battle=null;render()}}
    function showDeck(){if(!run)return;const names=run.deck.map(id=>CARDS[id].name).join('、');showToast(`牌组 ${run.deck.length} 张：${names}`,5000)}
    function showStatus(id){const info=STATUS_INFO[id];if(info)showToast(`${info.name}：${info.text}`,6500)}
    function showToast(msg,duration=2500){document.querySelector('.toast')?.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),duration)}
    const beginDefaultAudio=()=>audio.start();
    window.addEventListener('pointerdown',beginDefaultAudio,{once:true});
    window.addEventListener('keydown',beginDefaultAudio,{once:true});
    render();
  </script>
</body>
</html>
