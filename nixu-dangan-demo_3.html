<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#11120e" />
  <title>逆序档案｜完整闭环试玩</title>
  <style>
    :root{--ink:#11120e;--ink2:#191a15;--panel:#22231d;--paper:#e9dfc8;--muted:#958d7b;--line:#47463b;--red:#c84534;--red2:#742019;--gold:#c9a65d;--green:#7e9d78;--blue:#788ea5;--shadow:#050504aa}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--ink);color:var(--paper)}
    body{font-family:"Songti SC","STSong",Georgia,serif;background:radial-gradient(circle at 82% 0,#351713 0,transparent 27%),linear-gradient(145deg,#171812,#090a08);padding:20px}
    button{font:inherit}.app{max-width:1220px;margin:auto;position:relative}.noise{position:fixed;inset:0;pointer-events:none;opacity:.22;background:repeating-linear-gradient(0deg,transparent 0 3px,#fff2 3px 4px);mix-blend-mode:overlay}
    .top{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:15px}.brand{display:flex;gap:12px;align-items:center}.seal{width:44px;height:44px;display:grid;place-items:center;border:2px solid var(--red);color:var(--red);font-size:24px;box-shadow:inset 0 0 0 3px var(--ink),inset 0 0 0 4px #711d17;transform:rotate(-2deg)}
    .eyebrow{margin:0 0 4px;font:700 9px ui-monospace,monospace;letter-spacing:.2em;color:#7c7669;text-transform:uppercase}.brand h1{margin:0;font-size:22px;letter-spacing:.18em}.top-actions{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:11px}.linkbtn{border:0;border-bottom:1px solid #696254;background:none;color:#bbb19d;cursor:pointer;padding:3px 0}.linkbtn:hover,.linkbtn.on{color:var(--gold);border-color:var(--gold)}
    .hud{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;padding:15px 0}.mission{font-size:13px;color:#b8af9c}.mission b{color:var(--red);margin-right:10px}.stats{display:flex;border:1px solid var(--line);background:#151610}.stat{padding:7px 13px;min-width:80px;border-right:1px solid var(--line)}.stat:last-child{border:0}.stat small{display:block;color:#746e61;font-size:8px}.stat strong{font:13px ui-monospace,monospace}.gold{color:var(--gold)}.red{color:#e55d4b}.green{color:#91b589}
    .panel{border:1px solid var(--line);background:linear-gradient(145deg,#22231d,#151610);box-shadow:0 18px 45px var(--shadow)}.screen{animation:fade .28s ease}@keyframes fade{from{opacity:.3;transform:translateY(5px)}to{opacity:1;transform:none}}
    .intro{min-height:620px;display:grid;grid-template-columns:1.15fr .85fr;overflow:hidden}.intro-copy{padding:clamp(34px,6vw,76px);display:flex;flex-direction:column;justify-content:center}.chapter{color:var(--red);font-size:11px;letter-spacing:.15em}.intro h2{max-width:620px;margin:16px 0 20px;font-size:clamp(34px,5vw,64px);line-height:1.08;font-weight:500;letter-spacing:.05em}.intro .lead{max-width:610px;color:#b9b09d;line-height:1.9;font-size:14px}.quote{margin:24px 0;padding:14px 16px;border-left:2px solid var(--red);background:#0b0c0980;color:#cfc3aa;font-size:13px;line-height:1.7}.intro-art{position:relative;display:grid;place-items:center;border-left:1px solid var(--line);background:radial-gradient(circle,#6b292144,transparent 55%),repeating-linear-gradient(45deg,transparent 0 17px,#ffffff08 17px 18px)}.clock{position:relative;width:min(330px,72%);aspect-ratio:1;border:1px solid #796143;border-radius:50%;box-shadow:0 0 0 18px #171812,0 0 0 19px #4b4437}.clock:before,.clock:after{content:"";position:absolute;left:50%;top:50%;width:2px;background:var(--red);transform-origin:top}.clock:before{height:35%;transform:rotate(218deg)}.clock:after{height:25%;transform:rotate(105deg);background:var(--gold)}.clock-core{position:absolute;inset:29%;display:grid;place-items:center;border:1px solid #695d49;color:var(--red);font-size:56px}.fragment-count{position:absolute;bottom:28px;color:#8d826f;font-size:11px;letter-spacing:.08em}
    .primary{display:flex;justify-content:space-between;align-items:center;gap:28px;min-width:205px;padding:12px 16px;border:1px solid var(--red);background:var(--red2);color:#f4ddd2;cursor:pointer;box-shadow:5px 5px 0 #310d0a}.primary:hover{background:#8a281f}.primary:disabled{border-color:#47463e;background:#22231e;color:#5d584d;box-shadow:none;cursor:not-allowed}.intro .primary{align-self:flex-start;margin-top:8px}.primary b{color:#ef806f;font-size:17px}
    .map-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;min-height:620px}.map-main{padding:26px}.section-title{display:flex;justify-content:space-between;align-items:end;margin-bottom:22px}.section-title h2{margin:4px 0 0;font-size:25px;font-weight:500;letter-spacing:.08em}.section-title p{margin:0;color:#8f8878;font-size:11px}.route{position:relative;display:grid;grid-template-rows:repeat(4,1fr);gap:18px;min-height:500px;padding:8px 5%}.route:before{content:"";position:absolute;left:50%;top:7%;bottom:7%;width:1px;background:linear-gradient(var(--red),#6d6453,var(--red))}.layer{position:relative;display:flex;justify-content:center;gap:17%;align-items:center}.layer-tag{position:absolute;left:0;color:#5d584e;font:10px ui-monospace,monospace}.node{position:relative;z-index:1;width:190px;min-height:80px;padding:12px;border:1px solid #575144;background:#1c1d18;color:var(--paper);text-align:left;cursor:pointer;box-shadow:0 10px 24px #0005;transition:.18s}.node:hover:not(:disabled){transform:translateY(-3px);border-color:var(--gold)}.node:disabled{opacity:.32;cursor:not-allowed}.node.boss{border-color:#853428;background:linear-gradient(145deg,#321c17,#1b1714)}.node-icon{float:left;width:35px;height:35px;margin-right:10px;display:grid;place-items:center;border:1px solid var(--accent);color:var(--accent);font-size:17px}.node small{display:block;color:#777063;font-size:8px;margin-bottom:4px}.node strong{font-size:13px;font-weight:500}.node p{clear:both;margin:9px 0 0;color:#817a6c;font-size:9px}.node.battle,.node.elite{--accent:var(--red)}.node.event{--accent:var(--gold)}.node.rest{--accent:var(--green)}.node.boss{--accent:#ee604d}.node.cleared:after{content:"已调查";position:absolute;right:7px;top:6px;color:var(--green);font-size:8px}.node.current{box-shadow:0 0 0 2px #8f7950,0 12px 25px #0008}
    .side{padding:20px}.side-block{padding-bottom:17px;margin-bottom:17px;border-bottom:1px solid var(--line)}.side h3{margin:4px 0 12px;font-size:14px;font-weight:500}.relic{padding:9px;border-left:2px solid var(--gold);background:#171812;color:#a99f8b;font-size:10px;line-height:1.5}.story-log{display:flex;flex-direction:column;gap:9px;color:#817a6c;font-size:10px;line-height:1.55}.deck-mini{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}.mini-card{padding:6px 7px;border:1px solid #48463b;border-left:2px solid var(--accent);background:#191a15;font-size:9px;color:#aaa18e}
    .story-screen{max-width:860px;margin:28px auto;padding:clamp(26px,5vw,56px)}.story-screen h2{font-size:30px;font-weight:500;margin:12px 0}.story-screen .narrative{color:#b9b09d;line-height:2;font-size:14px}.choices{display:grid;gap:10px;margin-top:24px}.choice{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:13px;border:1px solid #4e4b40;background:#191a15;color:var(--paper);text-align:left;cursor:pointer}.choice:hover{border-color:var(--gold);background:#222218}.choice-icon{display:grid;place-items:center;width:38px;height:38px;border:1px solid var(--gold);color:var(--gold);font-size:18px}.choice strong{display:block;font-size:13px}.choice small{color:#81796a;font-size:10px}.choice em{color:#bba765;font-size:10px;font-style:normal}.remove-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:20px}.remove-card{padding:11px;border:1px solid var(--line);border-top:2px solid var(--accent);background:#1b1c17;color:var(--paper);cursor:pointer}.remove-card:hover{border-color:var(--red)}
    .battle-head{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:15px 18px;border:1px solid #6c3028;background:linear-gradient(90deg,#351814,#171813)}.battle-head h2{margin:3px 0;font-size:19px;font-weight:500}.battle-head .storyline{color:#a89d88;font-size:10px}.objective{text-align:right}.objective small{display:block;color:#8b8171;font-size:9px}.objective strong{font:17px ui-monospace,monospace;color:var(--gold)}.progress{width:220px;height:4px;margin-top:7px;background:#3c382f}.progress i{display:block;height:100%;background:var(--gold)}
    .incident{display:grid;grid-template-columns:62px 1fr minmax(250px,.7fr);align-items:center;margin-top:11px;border:1px solid #633028;background:#1a1713}.incident-glyph{height:64px;display:grid;place-items:center;border-right:1px solid #633028;color:#e35c4a;font-size:25px}.incident h3{margin:0 14px;font-size:15px;font-weight:500}.incident-intent{align-self:stretch;display:flex;flex-direction:column;justify-content:center;padding:8px 14px;border-left:1px solid var(--line)}.incident-intent small{color:#746d60;font-size:8px}.incident-intent strong{font-size:10px;margin-top:3px}
    .timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.era{padding:0;border:1px solid var(--line);background:#171812;color:inherit;text-align:left;min-height:151px;transition:.18s}.era.target{border-color:#766443;cursor:crosshair}.era.target:hover{transform:translateY(-2px);border-color:var(--gold)}.era-head{display:grid;grid-template-columns:27px 1fr;padding:8px 11px;border-bottom:1px solid var(--line);background:#10110d}.era-head span{grid-row:span 2;color:#565145;font:16px ui-monospace,monospace}.era-head strong{font-size:13px;letter-spacing:.16em}.era-head small{color:#686156;font-size:8px}.drop{min-height:101px;padding:8px;display:flex;flex-direction:column;justify-content:center;gap:6px}.drop-hint{text-align:center;color:#514c42;font-size:9px;letter-spacing:.1em}.fixed,.placed{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:7px;padding:7px 8px;background:#29231e;border-left:3px solid var(--red);font-size:10px}.fixed small{color:#c36b5e}.fixed strong{text-align:right}.placed{background:#25261f;border-left-color:var(--accent)}.placed i{display:grid;place-items:center;width:19px;height:19px;border:1px solid var(--accent);color:var(--accent);font-style:normal}.placed small{color:#70695e}.因{--accent:#7e9d78}.证{--accent:#c9a65d}.改{--accent:#788ea5}.锚{--accent:#b6ab91}.悖{--accent:#b94c51}
    .hand-head{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:10px 0 8px}.hand-head h3{margin:0;font-size:14px;font-weight:500}.energy{font:10px ui-monospace,monospace;color:var(--muted)}.energy b{display:inline-grid;place-items:center;width:27px;height:27px;border:1px solid var(--gold);border-radius:50%;color:var(--gold);font-size:14px}.hand{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.card{position:relative;min-height:190px;padding:9px;border:1px solid #4b493f;border-top:3px solid var(--accent);background:linear-gradient(145deg,#292a22,#181914);color:var(--paper);text-align:left;cursor:pointer;box-shadow:0 10px 20px #0005;transition:.16s}.card:hover:not(:disabled),.card.selected{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 15px 25px #0008}.card:disabled{opacity:.25;cursor:not-allowed}.card-top{display:flex;justify-content:space-between;align-items:center}.cost{display:grid;place-items:center;width:26px;height:26px;border:1px solid var(--accent);border-radius:50%;color:var(--accent);font:13px ui-monospace,monospace}.kind{font-size:8px;color:#8b8475}.art{height:46px;margin:7px 0;display:grid;place-items:center;border:1px solid #ffffff10;background:radial-gradient(circle,#ffffff0c,transparent 65%);color:var(--accent);font-size:21px}.card h4{margin:0 0 5px;font-size:13px}.card p{margin:0;color:#b5ac98;font-size:9px;line-height:1.45}.card em{display:block;border-top:1px solid #ffffff10;margin-top:6px;padding-top:5px;color:#6c665b;font-size:7px;font-style:normal}.free{position:absolute;top:4px;left:40px;color:var(--green);font:8px ui-monospace,monospace}
    .actionbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:11px}.actionbar p{margin:0;color:#777064;font-size:10px}.battle-log{min-height:28px;margin-top:8px;padding:7px 9px;border-left:2px solid #625744;background:#151610;color:#837b6c;font-size:9px;line-height:1.5}
    .reward{max-width:960px;margin:28px auto;padding:30px}.reward h2{text-align:center;font-size:27px;font-weight:500}.reward .lead{text-align:center;color:#8e8676;font-size:12px}.reward-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:26px 0}.reward-card{min-height:260px}.skip{display:block;margin:auto}
    .ending{min-height:620px;display:grid;place-items:center;padding:30px;text-align:center}.ending-inner{max-width:650px}.ending-seal{display:grid;place-items:center;width:92px;height:92px;margin:0 auto 24px;border:3px double var(--green);color:var(--green);font-size:43px;transform:rotate(-3deg)}.ending.loss .ending-seal{border-color:var(--red);color:var(--red)}.ending h2{font-size:35px;font-weight:500;letter-spacing:.07em}.ending .narrative{color:#b7ae9a;line-height:2;font-size:14px}.unlock{margin:24px 0;padding:13px;border:1px solid #66583b;background:#211c13;color:#c8b276;font-size:11px}.ending .primary{margin:22px auto 0}
    .toast{position:fixed;left:50%;bottom:26px;z-index:20;transform:translateX(-50%);padding:9px 14px;border:1px solid #6c5b3c;background:#1b180f;color:#d1bd82;font-size:10px;box-shadow:0 12px 30px #000;animation:toast 2.4s both}@keyframes toast{0%{opacity:0;transform:translate(-50%,8px)}12%,82%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}
    @media(max-width:900px){body{padding:13px}.intro{grid-template-columns:1fr}.intro-art{min-height:300px;border-left:0;border-top:1px solid var(--line)}.map-layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}.side-block{margin:0}.hand{overflow-x:auto;grid-template-columns:repeat(5,170px);padding:6px 2px 12px}.card:hover:not(:disabled),.card.selected{transform:translateY(-3px)}.reward-grid{overflow-x:auto;grid-template-columns:repeat(3,220px)}}
    @media(max-width:640px){.top{align-items:flex-start}.top-actions{max-width:180px;flex-wrap:wrap;justify-content:flex-end;gap:7px 11px}.hud{grid-template-columns:1fr}.stats{display:grid;grid-template-columns:repeat(4,1fr)}.stat{min-width:0;padding:7px}.map-main{padding:16px}.route{padding:6px 0}.layer{gap:8px}.node{width:46%;min-height:88px}.node p{display:none}.layer-tag{display:none}.side{grid-template-columns:1fr}.incident{grid-template-columns:52px 1fr}.incident-glyph{height:52px}.incident-intent{grid-column:span 2;border-left:0;border-top:1px solid var(--line)}.timeline{grid-template-columns:1fr}.era{min-height:120px}.drop{min-height:70px}.battle-head{grid-template-columns:1fr}.objective{text-align:left}.progress{width:100%}.actionbar{align-items:stretch;flex-direction:column}.primary{width:100%}.remove-grid{grid-template-columns:repeat(2,1fr)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main class="app" id="app"></main>
  <script>
    const CARDS={
      seal:{id:'seal',name:'封锁仓库',kind:'因',cost:1,text:'在固定事件前生效：抵挡本轮灾害。',flavor:'先改变门，再改变结局。'},
      rescue:{id:'rescue',name:'紧急疏散',kind:'因',cost:1,text:'置于「现在」：真相 +1，并保护证人。',flavor:'正确的行动需要正确的时刻。'},
      ledger:{id:'ledger',name:'账本残页',kind:'证',cost:1,text:'真相 +2；若证人存活，改为 +3。',flavor:'灰烬没有烧掉所有数字。'},
      clarify:{id:'clarify',name:'澄清谣言',kind:'证',cost:1,text:'可信度 +1；在事件前可破解谣言。',flavor:'事实需要赶在声音前面。'},
      memory:{id:'memory',name:'真实记忆',kind:'改',cost:2,text:'真相 +3，悖论 +2；置于过去时真相 +4。',flavor:'记忆可以重写证据。'},
      anchor:{id:'anchor',name:'时间锚',kind:'锚',cost:1,text:'在事件前锚定真相，悖论 -1。',flavor:'把一页纸钉在世界上。'},
      alibi:{id:'alibi',name:'伪造口供',kind:'悖',cost:1,text:'可信度 +2，真相 +1，悖论 +2。',flavor:'好用的谎言通常只好用一次。'},
      blackout:{id:'blackout',name:'提前停电',kind:'改',cost:1,text:'置于过去：取消固定事件，悖论 +2。',flavor:'让事故发生在事故之前。'},
      annotation:{id:'annotation',name:'逆序批注',kind:'改',cost:1,text:'真相 +1；置于未来时改为 +3。',flavor:'这行字来自尚未写下它的人。'},
      echo:{id:'echo',name:'因果回响',kind:'证',cost:1,text:'每有一种已打出的不同标签，真相 +1。',flavor:'不同的原因指向同一个结果。'},
      testimony:{id:'testimony',name:'封存口供',kind:'锚',cost:1,text:'可信度 +1；若已有可信度，真相 +2。',flavor:'说出口的话也能成为锚。'},
      vow:{id:'vow',name:'以身作证',kind:'悖',cost:2,text:'真相 +5；若悖论≥4，再 +2，但时间线 -2。',flavor:'有些证据只能用自己签名。'},
      thread:{id:'thread',name:'红线追迹',kind:'证',cost:0,text:'真相 +1；若置于现在，可信度 +1。',flavor:'所有名字都被一根线牵住。'},
      delay:{id:'delay',name:'延迟发生',kind:'因',cost:1,text:'抵挡本轮灾害；若置于未来，真相 +1。',flavor:'不是阻止，只是让它晚一点。'}
    };
    const KIND_NAMES={因:'创造条件',证:'揭露信息',改:'改写时序',锚:'固定历史',悖:'高风险收益'};
    const START_DECK=['seal','seal','ledger','ledger','rescue','clarify','memory','anchor','alibi'];
    const REWARD_POOL=['blackout','annotation','echo','testimony','vow','thread','delay','anchor','ledger','clarify'];
    const INCIDENTS={
      fire:{name:'固定事件：仓库火灾',era:2,glyph:'火',intent:'未受保护：时间线 -4，证人死亡'},
      interrogation:{name:'固定事件：监察官审讯',era:1,glyph:'审',intent:'可信度不足：时间线 -3'},
      rumor:{name:'固定事件：伪造的报纸',era:0,glyph:'伪',intent:'未被澄清：可信度归零，悖论 +1'},
      mirror:{name:'固定事件：镜像复述',era:1,glyph:'镜',intent:'标签少于 2 种：时间线 -3'},
      theft:{name:'固定事件：证物窃取',era:1,glyph:'窃',intent:'未受保护：时间线 -3'},
      purge:{name:'固定事件：档案销毁',era:2,glyph:'毁',intent:'真相未锚定：失去 3 点真相'},
      rewrite:{name:'固定事件：规则改写',era:1,glyph:'改',intent:'未取消：悖论 +1，时间线 -2'},
      collapse:{name:'固定事件：零时坍塌',era:2,glyph:'零',intent:'真相未锚定：时间线 -6，悖论 +1'}
    };
    const ENCOUNTERS={
      fire:{name:'余烬证人',type:'普通案件',target:7,incidents:['fire','interrogation','fire'],story:'她已经在仓库里死过十七次。这一次，她在火起之前看见了你。'},
      mirror:{name:'镜廊审讯',type:'普通案件',target:9,incidents:['rumor','mirror','interrogation'],story:'监察官逐字复述你的供词，连停顿都一模一样——比你早半秒。'},
      twins:{name:'双生书吏',type:'精英案件',target:12,incidents:['theft','mirror','purge','theft'],story:'两个书吏共用一段过去。你删除其中一人，另一人便记起两次死亡。'},
      boss:{name:'零时档案',type:'固定历史 · Boss',target:18,incidents:['rewrite','fire','purge','collapse','collapse'],story:'档案管理员摘下面具。那张脸属于三天后的你。'}
    };
    const LAYERS=[
      [{type:'battle',id:'fire',icon:'火',title:'余烬证人',sub:'普通案件',desc:'救下仓库里的唯一证人'}, {type:'event',id:'telegram',icon:'函',title:'无字电报',sub:'异常事件',desc:'一封来自明天的电报'}],
      [{type:'battle',id:'mirror',icon:'镜',title:'镜廊审讯',sub:'普通案件',desc:'监察官知道你下一句供词'}, {type:'rest',id:'rest',icon:'息',title:'回声室',sub:'安全节点',desc:'修补时间线或精简牌组'}],
      [{type:'elite',id:'twins',icon:'双',title:'双生书吏',sub:'精英案件',desc:'共享过去的两名守档人'}, {type:'event',id:'photo',icon:'像',title:'失真的合影',sub:'异常事件',desc:'照片上多出一个你'}],
      [{type:'boss',id:'boss',icon:'零',title:'零时档案',sub:'固定历史',desc:'灾难真正的起点'}]

      });
      if(!cancelled){
        if(inc===INCIDENTS.fire){if(protectedNow){battle.truth++;msgs.push('火灾被控制：真相 +1。')}else{run.hp-=4;battle.witness=false;msgs.push('证人死于火灾：时间线 -4。')}}
        if(inc===INCIDENTS.interrogation){if(battle.cred>=1){battle.truth+=2;msgs.push('证词被采纳：真相 +2。')}else{run.hp-=3;msgs.push('审讯击穿叙事：时间线 -3。')}}
        if(inc===INCIDENTS.rumor){if(clarified){battle.truth++;msgs.push('假报纸被揭穿：真相 +1。')}else{battle.cred=0;run.paradox++;msgs.push('谣言覆盖证词：悖论 +1。')}}
        if(inc===INCIDENTS.mirror){if(kinds.size>=2){battle.truth+=2;msgs.push('镜像无法复制组合：真相 +2。')}else{run.hp-=3;msgs.push('单一行动被镜像反制：时间线 -3。')}}
        if(inc===INCIDENTS.theft){if(protectedNow){battle.truth++;msgs.push('证物保住了：真相 +1。')}else{run.hp-=3;msgs.push('证物被窃：时间线 -3。')}}
        if(inc===INCIDENTS.purge){if(anchored)msgs.push('销毁无法触及被锚定的真相。');else{battle.truth=Math.max(0,battle.truth-3);msgs.push('档案销毁：真相 -3。')}}
        if(inc===INCIDENTS.rewrite){run.hp-=2;run.paradox++;msgs.push('规则被改写：时间线 -2，悖论 +1。')}
        if(inc===INCIDENTS.collapse){if(anchored){battle.truth+=2;msgs.push('你站在坍塌中固定历史：真相 +2。')}else{run.hp-=6;run.paradox++;msgs.push('零时坍塌：时间线 -6，悖论 +1。')}}
      }
      if(run.hp<beforeHp)audio.sfx('hurt');battle.log=msgs;
      if(run.hp<=0||run.paradox>=8){finishRun(false,run.paradox>=8?'悖论互相否定，整条时间线从未存在过。':'时间线彻底断裂，你再次在火灾前三分钟醒来。');return}
      if(battle.truth>=battle.enc.target){if(battle.id==='boss'){finishRun(true);return}winBattle();return}
      battle.discard.push(...battle.hand.map(x=>x.id));battle.hand=[];battle.placed=[];battle.selected=null;battle.energy=3;battle.round++;drawCards(5);render()
    }
    function winBattle(){audio.sfx('reward');run.story.push(`${battle.enc.name}已结案，留下 ${battle.truth} 点可用真相。`);rewardOptions=shuffle(REWARD_POOL).slice(0,3);state={screen:'reward'};audio.setTheme('story');render()}
    function renderReward(app){app.innerHTML=`${header('战后记录')}${hud()}<section class="reward panel screen"><p class="eyebrow">ADD A POSSIBILITY</p><h2>带走一种新的可能</h2><p class="lead">选择一张牌加入本局牌组。它会从下一份档案开始出现。</p><div class="reward-grid">${rewardOptions.map(id=>{const c=CARDS[id];return `<button class="card reward-card ${c.kind}" data-reward="${id}"><div class="card-top"><span class="cost">${c.cost}</span><span class="kind">${c.kind} · ${KIND_NAMES[c.kind]}</span></div><div class="art">${c.name[0]}</div><h4>${c.name}</h4><p>${c.text}</p><em>${c.flavor}</em></button>`}).join('')}</div><button class="linkbtn skip" id="skipReward">跳过奖励 · 修复 3 点时间线</button></section>`;document.querySelectorAll('[data-reward]').forEach(b=>b.onclick=()=>{audio.sfx('reward');run.deck.push(b.dataset.reward);advanceNode()});$('#skipReward').onclick=()=>{run.hp=Math.min(run.maxHp,run.hp+3);advanceNode()}}
    function finishRun(win,reason=''){audio.sfx(win?'win':'lose');if(win){meta.wins++;meta.ink+=3;run.story.push('零时档案被改写，但第零号档案仍未开启。')}else meta.ink+=Math.max(1,run.floor);meta.runs++;saveMeta();state={screen:'ending',win,reason};audio.setTheme('ending');render()}
    function renderEnding(app){const win=state.win,firstUnlock=meta.ink>=3;app.innerHTML=`${header(win?'档案结算 · 历史成立':'档案结算 · 循环重启')}<section class="ending panel screen ${win?'':'loss'}"><div class="ending-inner"><p class="eyebrow">${win?'CASE CLOSED · NOT THE END':'TIMELINE COLLAPSED · TRY AGAIN'}</p><div class="ending-seal">${win?'真':'悖'}</div><h2>${win?'你阻止了零点火灾':'这条历史无法成立'}</h2><p class="narrative">${win?'档案管理员在消失前，把一把不存在的钥匙塞进你手里。档案馆地下还有一层，门牌上写着“第零号”。而门后的值班表，签着你的名字，日期是明天。':state.reason}</p><div class="unlock">本次带回 ${win?3:Math.max(1,run.floor)} 枚墨痕 · 累计 ${meta.ink} 枚<br>${firstUnlock?'下一次循环将携带「烧焦的怀表」；每场案件第一张牌费用为 0。':'收集 3 枚墨痕，可从下一次循环携带新的遗物。'}</div><button class="primary" id="againBtn"><span>${win?'带着钥匙进入下一次循环':'记住失败，再试一次'}</span><b>↻</b></button></div></section>`;$('#againBtn').onclick=()=>{audio.sfx('resolve');state={screen:'intro'};run=null;battle=null;render()}}
    function showDeck(){if(!run)return;const names=run.deck.map(id=>CARDS[id].name).join('、');showToast(`牌组 ${run.deck.length} 张：${names}`)}
    function showToast(msg){document.querySelector('.toast')?.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
    render();
  </script>
</body>
</html>
